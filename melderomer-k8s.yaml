# ============================================================
# melderomer-k8s.yaml - K3s deployment
# No hyphens in names (containerd bug)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: melderomer-config
  namespace: mlai
data:
  config.toml: |
    [listener]
    type = "socket"
    [service.ssh]
    type = "ssh-simulator"
    credentials = [
        "root:root","root:password","root:123456","root:admin","root:toor",
        "admin:admin","admin:password","admin:123456","ubuntu:ubuntu","ubuntu:password",
        "test:test","guest:guest","user:user","user:password","pi:raspberry",
        "ftp:ftp","support:support","operator:operator","mysql:mysql","postgres:postgres",
        "oracle:oracle","nagios:nagios","git:git","jenkins:jenkins","deploy:deploy",
        "www:www","web:web","apache:apache","nginx:nginx","docker:docker",
        "kubernetes:kubernetes","redis:redis","mongo:mongo","elastic:elastic",
        "kibana:kibana","grafana:grafana","prometheus:prometheus","consul:consul",
        "vault:vault","ansible:ansible","terraform:terraform"
    ]
    [[port]]
    ports = ["tcp/2222"]
    services = ["ssh"]
    [service.telnet]
    type = "telnet"
    server-name = "Ubuntu-SSH-4.15.0-142-generic"
    [[port]]
    ports = ["tcp/2223"]
    services = ["telnet"]
    [service.http]
    type = "http"
    [[port]]
    ports = ["tcp/8888"]
    services = ["http"]
    [channel.console]
    type = "console"
    [channel.file]
    type = "file"
    filename = "/opt/melderomer/log/melderomer.json"
    [[filter]]
    channel = ["console", "file"]
    [[logging]]
    output = "stdout"
    level = "info"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: melderomer-data
  namespace: mlai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: melderomer
  namespace: mlai
  labels:
    app: melderomer
    tier: honeypot
    version: "5.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: melderomer
  template:
    metadata:
      labels:
        app: melderomer
        tier: honeypot
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: melderomer
          image: localhost/melderomer:5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
            - name: telnet
              containerPort: 2223
              protocol: TCP
            - name: http
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /opt/melderomer/config/config.toml
              subPath: config.toml
            - name: data
              mountPath: /opt/melderomer/data
            - name: logs
              mountPath: /opt/melderomer/log
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: melderomer-config
        - name: data
          persistentVolumeClaim:
            claimName: melderomer-data
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: melderomer-ssh
  namespace: mlai
spec:
  type: NodePort
  selector:
    app: melderomer
  ports:
    - port: 2222
      targetPort: 2222
      nodePort: 30222
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: melderomer-telnet
  namespace: mlai
spec:
  type: NodePort
  selector:
    app: melderomer
  ports:
    - port: 2223
      targetPort: 2223
      nodePort: 30223
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: melderomer-http
  namespace: mlai
spec:
  type: NodePort
  selector:
    app: melderomer
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30888
      protocol: TCP
